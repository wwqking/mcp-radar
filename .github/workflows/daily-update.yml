name: 每日采集与部署

# 方案 A：每天在 CI 里采集真实数据 → 写快照 → commit 回仓库 → 触发 Vercel 部署。
# 采集/commit 在这里做（有 git 写权限、快照能持久累积趋势）；Vercel 只负责 build+上线。

on:
  schedule:
    # UTC 22:00 = 北京时间次日 06:00，每天一次
    - cron: "0 22 * * *"
  workflow_dispatch: {} # 支持手动触发

# 允许 workflow 把快照 commit 回仓库
permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: 采集真实数据 + 写当天快照
        env:
          GITHUB_TOKEN: ${{ secrets.MCP_GITHUB_TOKEN }} # 只读 public_repo，仅 CI 用
          MCP_COLLECT_LIMIT: ${{ vars.MCP_COLLECT_LIMIT || '40' }}
        run: npm run collect

      - name: 提交快照（有变化才提交）
        # Vercel 已开启 Git 自动部署：这个 push 会自动触发 Vercel 重新 build + 上线，
        # 无需单独的 Deploy Hook。数据每日随快照 push 自动更新。
        run: |
          git config user.name "mcp-radar-bot"
          git config user.email "bot@mcpradars.com"
          if [ -n "$(git status --porcelain data/snapshots)" ]; then
            git add data/snapshots
            git commit -m "chore: 每日快照 $(date -u +%Y-%m-%d)"
            git push
            echo "✓ 快照已更新并推送（将自动触发 Vercel 部署）"
          else
            echo "无快照变化，跳过提交（无需部署）"
          fi
